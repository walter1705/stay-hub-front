openapi: 3.0.3
info:
  title: StayHub v2 API
  version: 1.0.0
  description: OpenAPI spec generated from the current implemented controllers in StayHub v2.
servers:
  - url: http://localhost:8080
    description: Local server
paths:
  /api/v2/users/auth/signup:
    post:
      tags:
        - Users
      summary: Register a new user
      operationId: signupUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSignupRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSignupResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/users/auth/login:
    post:
      tags:
        - Users
      summary: Login user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/accommodations/{id}:
    get:
      tags:
        - Accommodations
      summary: Get accommodation by id
      operationId: getAccommodationById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Accommodation id
      responses:
        '200':
          description: Accommodation retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccommodationGetByIdResponse'
        '404':
          description: Accommodation not found
          content:
            application/json:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Accommodations
      summary: Deactivate accommodation
      description: Soft deletes an accommodation if it has no future active reservations, validating if user is the owner.
      operationId: deactivateAccommodation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: Accommodation id
      responses:
        '200':
          description: Accommodation deactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Active future reservations exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized action, user is not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Accommodation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/users/auth/forgot-password:
    post:
      tags:
        - Users
      summary: Forgot password
      description: Generates a recovery code and sends it via email
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Recovery code sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/users/auth/reset-password:
    post:
      tags:
        - Users
      summary: Reset password
      description: Resets user password using a recovery code
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired recovery code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/bookings/book:
    post:
      tags:
        - Bookings
      summary: Create a reservation
      description: Creates a new reservation for an accommodation. Validates that dates are in the future and end date is after start date.
      operationId: bookAccommodation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: Reservation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservationResponse'
        '400':
          description: Validation error (dates invalid or end before start)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Accommodation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Accommodation not available for selected dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v2/users/auth/change-password:
    put:
      tags:
        - Users
      summary: Change password
      description: Changes user's password requiring the current password
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation or rules error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: Invalid login attempt detected
        code:
          type: integer
          example: 401
      required:
        - message
        - code
    TokenResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiJ1c2VyQGV4YW1wbGUuY29tIiwiZXhwIjoxNzI1ODk4MDAwfQ.abc
      required:
        - token
    UserSignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 100
          example: john.doe@example.com
        password:
          type: string
          pattern: ^(?=.*[A-Z])(?=.*\\d).{8,}$
          example: P@ssw0rd123
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
          uniqueItems: true
          example:
            - GUEST
            - HOST
        fullName:
          type: string
          maxLength: 100
          example: John Giggity Doe
        phoneNumber:
          type: string
          pattern: ^\\+57\\s?\\d{10}$
          example: +573101234567
        birthDate:
          type: string
          format: date
          example: 1990-01-01
        profilePicture:
          type: string
          format: uri
          example: https://example.com/profile.jpg
      required:
        - email
        - password
        - roles
        - fullName
        - phoneNumber
        - birthDate
    UserSignupResponse:
      allOf:
        - $ref: '#/components/schemas/UserSignupRequest'
    UserLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          example: P@ssw0rd123
      required:
        - email
        - password
    AccommodationGetByIdResponse:
      type: object
      properties:
        host:
          $ref: '#/components/schemas/User'
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        capacity:
          type: integer
          minimum: 1
        pricePerNight:
          type: number
          format: double
        mainImage:
          type: string
          format: uri
        locationDescription:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        images:
          type: array
          items:
            type: string
            format: uri
        available:
          type: boolean
      required:
        - host
        - title
        - description
        - capacity
        - pricePerNight
        - locationDescription
        - city
        - images
        - available
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        password:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
          uniqueItems: true
        fullName:
          type: string
        phoneNumber:
          type: string
        birthDate:
          type: string
          format: date
        deleted:
          type: boolean
        profilePicture:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Role:
      type: string
      enum:
        - GUEST
        - HOST
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operación realizada exitosamente
      required:
        - message
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
      required:
        - email
    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        code:
          type: string
          example: "123456"
        newPassword:
          type: string
          pattern: ^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!])(?=\S+$).{8,}$
          example: NewP@ssw0rd!
      required:
        - email
        - code
        - newPassword
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          example: OldP@ssw0rd123
        newPassword:
          type: string
          pattern: ^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!])(?=\S+$).{8,}$
          example: NewP@ssw0rd!
      required:
        - currentPassword
        - newPassword
    CreateReservationRequest:
      type: object
      properties:
        accommodationId:
          type: integer
          format: int64
          example: 1
        startDate:
          type: string
          format: date-time
          example: 2025-06-01T14:00:00
        endDate:
          type: string
          format: date-time
          example: 2025-06-05T11:00:00
      required:
        - accommodationId
        - startDate
        - endDate
    CreateReservationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12345
        startDate:
          type: string
          format: date-time
          example: 2025-06-01T14:00:00
        endDate:
          type: string
          format: date-time
          example: 2025-06-05T11:00:00
        totalPrice:
          type: number
          format: double
          example: 450.00
        currency:
          type: string
          example: USD
        status:
          $ref: '#/components/schemas/ReservationStatus'
        accommodationId:
          type: integer
          format: int64
          example: 1
        accommodationTitle:
          type: string
          example: Beachfront Villa with Pool
        userId:
          type: integer
          format: int64
          example: 678
      required:
        - id
        - startDate
        - endDate
        - totalPrice
        - currency
        - status
        - accommodationId
        - accommodationTitle
        - userId
    ReservationStatus:
      type: string
      enum:
        - ACTIVE
        - CANCELLED
        - COMPLETED
